
<!DOCTYPE html>
<html>
<head>
    <title>Ficture Allocation Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        select.filter-select {
            width: auto;
            display: inline-block;
            margin-right: 1rem;
        }
    </style>
</head>
<body class="container py-4">

    <h2>✅ Allocation Completed</h2>
    <a href="/" class="btn btn-secondary mb-3">⬅️ Back</a>

    <p>📁 <strong>File:</strong> {{ filename }}</p>
    <a href="{{ url_for('static', filename='results/' + result_filename) }}" class="btn btn-success mb-3" download>⬇️ Download Processed CSV</a>

    <hr>
    <h4>🔍 Filter Data</h4>
    <form id="filter-form" class="mb-4">
        <label>Store:</label>
        <select id="storeFilter" class="form-select d-inline-block filter-select">
            <option value="">All</option>
        </select>
        <label>Department:</label>
        <select id="departmentFilter" class="form-select d-inline-block filter-select">
            <option value="">All</option>
        </select>
        <label>UDF:</label>
        <select id="udfFilter" class="form-select d-inline-block filter-select">
            <option value="">All</option>
        </select>
    </form>

    <div class="table-responsive">
        {{ table | safe }}
    </div>

    <hr>
    <h4>📈 Allocation Overview</h4>
    <div id="plot" class="mb-5"></div>

    <script>
        // Dynamically populate filters from the table
        const table = document.getElementById('resultTable');
        const storeFilter = document.getElementById('storeFilter');
        const departmentFilter = document.getElementById('departmentFilter');
        const udfFilter = document.getElementById('udfFilter');
        const columnMap = {{ column_map | tojson }};

        if (table) {
            const headerCells = Array.from(table.tHead?.rows?.[0]?.cells || []).map(cell => cell.textContent.trim());
            const dataRows = Array.from(table.tBodies?.[0]?.rows || []);

            const normalise = (value) => value.toLowerCase().replace(/[^a-z0-9]+/g, '');
            const headerLookup = headerCells.reduce((acc, text, index) => {
                acc[normalise(text)] = index;
                return acc;
            }, {});

            const resolveIndex = (key) => {
                const target = normalise(columnMap[key] || key);
                return headerLookup.hasOwnProperty(target) ? headerLookup[target] : -1;
            };

            const getColumnData = (columnIndex) => {
                if (columnIndex === -1) {
                    return [];
                }
                const values = new Set();
                dataRows.forEach(row => {
                    const cell = row.cells[columnIndex];
                    if (!cell) return;
                    values.add(cell.textContent.trim());
                });
                return Array.from(values).sort((a, b) => a.localeCompare(b));
            };

            const filterConfig = [
                { element: storeFilter, key: 'store' },
                { element: departmentFilter, key: 'department' },
                { element: udfFilter, key: 'udf' }
            ];

            function populateFilters() {
                filterConfig.forEach(({ element, key }) => {
                    if (!element) return;
                    const columnIndex = resolveIndex(key);
                    const options = ['<option value="">All</option>'];
                    getColumnData(columnIndex).forEach(value => {
                        const escaped = value.replace(/"/g, '&quot;');
                        options.push(`<option value="${escaped}">${value}</option>`);
                    });
                    element.innerHTML = options.join('');
                    element.disabled = columnIndex === -1;
                });
            }

            function applyFilters() {
                const columnIndexes = {
                    store: resolveIndex('store'),
                    department: resolveIndex('department'),
                    udf: resolveIndex('udf')
                };

                dataRows.forEach(row => {
                    const matches = (
                        (columnIndexes.store === -1 || !storeFilter.value || row.cells[columnIndexes.store]?.textContent.trim() === storeFilter.value) &&
                        (columnIndexes.department === -1 || !departmentFilter.value || row.cells[columnIndexes.department]?.textContent.trim() === departmentFilter.value) &&
                        (columnIndexes.udf === -1 || !udfFilter.value || row.cells[columnIndexes.udf]?.textContent.trim() === udfFilter.value)
                    );
                    row.style.display = matches ? '' : 'none';
                });
            }

            filterConfig.forEach(({ element }) => {
                if (!element) return;
                element.addEventListener('change', applyFilters);
            });

            populateFilters();
        }

        const plotData = {{ plot_data | tojson }};
        if (plotData && plotData.store && plotData.store.length) {
            const trace = {
                x: plotData.store,
                y: plotData.allocation,
                type: 'bar',
                marker: { color: '#0d6efd' }
            };
            Plotly.newPlot('plot', [trace], {
                title: 'Allocation by Store',
                xaxis: { title: columnMap.store },
                yaxis: { title: 'Final Allocation' }
            });
        } else {
            document.getElementById('plot').innerHTML = '<p class="text-muted">No allocation data available for plotting.</p>';
        }
    </script>

</body>
</html>
