
<!DOCTYPE html>
<html>
<head>
    <title>Results - Ficture Allocation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="container py-4">
    <h2>✅ Allocation Completed</h2>
    <a href="/" class="btn btn-secondary mb-3">⬅️ Back to Home</a>

    <h4>📁 File: {{ filename }}</h4>

    <div class="table-responsive mb-4">
        {{ table | safe }}
    </div>

    <div id="plot" class="mb-5"></div>

    <script>
        // Placeholder chart: you can dynamically generate this later with Flask + JSON endpoint
        var trace1 = {
            x: ['Pass 0', 'Pass 1', 'Pass 2'],
            y: [100, 80, 60],
            type: 'bar'
        };
        var layout = {
            title: 'Sample Allocation Overview',
            xaxis: { title: 'Pass' },
            yaxis: { title: 'Value' }
        };
        Plotly.newPlot('plot', [trace1], layout);
    </script>
</body>
</html>
